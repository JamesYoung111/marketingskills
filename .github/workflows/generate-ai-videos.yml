ALL_VIDEOS = LIFESTYLE_VIDEOS + PRODUCT_VIDEOS + EMOTIONAL_VIDEOS

def gen_image(item):
    print(f"\nImage: {item['file']}", flush=True)
    out = replicate.run(
        "black-forest-labs/flux-1.1-pro",
        input={
            "prompt": item["prompt"],
            "aspect_ratio": "9:16",
            "output_format": "png",
            "output_quality": 100,
            "safety_tolerance": 2,
            "prompt_upsampling": True,
        }
    )
    download(str(out), item["file"])
    Path(item["file"].replace(".png", ".txt")).write_text(item.get("caption", ""))

def gen_video(item):
    print(f"\nVideo: {item['file']} ({item.get('duration',5)}s)", flush=True)
    out = replicate.run(
        "kwaivgi/kling-v1-6-pro",
        input={
            "prompt": item["prompt"],
            "duration": item.get("duration", 5),
            "aspect_ratio": "9:16",
            "cfg_scale": 0.5,
        }
    )
    url = str(out) if isinstance(out, str) else str(list(out)[0])
    download(url, item["file"])
    Path(item["file"].replace(".mp4", ".txt")).write_text(item.get("caption", ""))

# Run based on batch selection
if BATCH in ("all", "images_only"):
    print(f"\n{'='*50}\nGenerating {len(IMAGES)} images\n{'='*50}", flush=True)
    for item in IMAGES:
        try: gen_image(item)
        except Exception as e: print(f"  ✗ {e}", flush=True)

if BATCH in ("all", "lifestyle"):
    print(f"\n{'='*50}\nLifestyle videos ({len(LIFESTYLE_VIDEOS)})\n{'='*50}", flush=True)
