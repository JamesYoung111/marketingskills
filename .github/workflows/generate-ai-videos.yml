name: Generate CampusClip AI Videos

on:
  workflow_dispatch:
    inputs:
      replicate_token:
        description: "Replicate API Token (r8_...)"
        required: true
        type: string
      batch:
        description: "Which batch to generate"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - lifestyle
          - product
          - emotional
          - images_only

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: claude/group-skills-employees-9rORY

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install replicate pillow requests

      - name: Generate content
        env:
          REPLICATE_API_TOKEN: ${{ github.event.inputs.replicate_token }}
          BATCH: ${{ github.event.inputs.batch }}
        run: |
          cd launch
          python3 - <<'PYEOF'
import os, urllib.request, time
from pathlib import Path
import replicate

BATCH = os.environ.get("BATCH", "all")

Path("ai-images").mkdir(exist_ok=True)
Path("ai-videos").mkdir(exist_ok=True)

def download(url, path):
    urllib.request.urlretrieve(str(url), path)
    print(f"  ✓ {path}", flush=True)

