name: Generate CampusClip Ad (Agency Pipeline)

# Combined pipeline:
#   Hedra  — AI avatar speaks the script  (hedra.com Creator plan, $10/month)
#   Kling  — cinematic campus B-roll       (piapi.ai, free credits on signup)
#   ffmpeg — composites both + phone mockup overlay

on:
  workflow_dispatch:
    inputs:
      hedra_api_key:
        description: "Hedra API Key (hedra.com/api-profile — requires Creator plan)"
        required: true
        type: string
      piapi_key:
        description: "PiAPI Key (piapi.ai workspace — free credits on signup)"
        required: true
        type: string
      avatar_image_url:
        description: "Public URL to a portrait JPG — the face used for the avatar"
        required: true
        type: string
      ad_name:
        description: "Which ad to generate"
        required: true
        default: "reel1_the_problem"
        type: choice
        options:
          - reel1_the_problem
          - reel2_seconds_vs_hours
          - reel3_one_app
          - all

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: claude/group-skills-employees-9rORY
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ffmpeg
        run: sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: pip install edge-tts

      - name: Generate Ad
        working-directory: launch
        env:
          HEDRA_API_KEY:    ${{ github.event.inputs.hedra_api_key }}
          PIAPI_KEY:        ${{ github.event.inputs.piapi_key }}
          HEDRA_AVATAR_URL: ${{ github.event.inputs.avatar_image_url }}
        run: python3 run_ad_agency.py ${{ github.event.inputs.ad_name }}

      - name: Commit generated ads
        run: |
          git config user.email "ai-bot@campusclip.ca"
          git config user.name "CampusClip AI"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/JamesYoung111/marketingskills.git
          git add launch/ai-videos/ad-agency/ || true
          git diff --staged --quiet && echo "Nothing new to commit" || \
            git commit -m "feat: ad agency — ${{ github.event.inputs.ad_name }}"
          git pull --rebase origin claude/group-skills-employees-9rORY
          git push origin claude/group-skills-employees-9rORY
